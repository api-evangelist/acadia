naftiko: "1.0.0-alpha1"

info:
  label: "Acadia Workforce Development"
  description: "Unified workforce development workflow using Acadia's Connected Worker Platform for managing employee training, skills matrices, work instructions, and quizzes. Used by HR managers, training coordinators, and operations managers to track and improve frontline worker capabilities."
  tags:
    - Acadia
    - Workforce Development
    - Connected Worker
    - Training Management
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ACADIA_API_TOKEN: ACADIA_API_TOKEN

capability:
  consumes:
    - import: acadia
      location: ./shared/acadia-platform.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: workforce-development-api
      description: "Unified REST API for workforce development and training management."
      resources:
        - path: /v1/work-instructions
          name: work-instructions
          description: "Manage digital work instructions"
          operations:
            - method: GET
              name: list-work-instructions
              description: "List all digital work instructions"
              call: "acadia.listWorkInstructions"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/employees
          name: employees
          description: "List employees and their training status"
          operations:
            - method: GET
              name: list-employees
              description: "List all employees with training completion data"
              call: "acadia.listEmployees"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/employees/{id}/skills
          name: employee-skills
          description: "Get employee skills matrix"
          operations:
            - method: GET
              name: get-employee-skills
              description: "Get skills matrix for a specific employee"
              call: "acadia.getEmployeeSkills"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/roles
          name: roles
          description: "List job roles and training requirements"
          operations:
            - method: GET
              name: list-roles
              description: "List all job roles with training requirements"
              call: "acadia.listRoles"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: workforce-development-mcp
      transport: http
      description: "MCP server for AI-assisted workforce development and training management."
      tools:
        - name: list-work-instructions
          description: "List all digital work instructions with status and category filtering"
          hints:
            readOnly: true
            openWorld: false
          call: "acadia.listWorkInstructions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-work-instruction
          description: "Create a new digital work instruction with title, category, and steps"
          hints:
            readOnly: false
            openWorld: false
          call: "acadia.createWorkInstruction"
          with:
            title: "tools.title"
            category: "tools.category"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-employees
          description: "List employees with training completion percentages, filtered by role or department"
          hints:
            readOnly: true
            openWorld: false
          call: "acadia.listEmployees"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-employee-skills
          description: "Get the complete skills matrix for an employee showing required and completed skills"
          hints:
            readOnly: true
            openWorld: false
          call: "acadia.getEmployeeSkills"
          with:
            id: "tools.employee_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-quizzes
          description: "List all active quizzes and assessments available in the platform"
          hints:
            readOnly: true
            openWorld: false
          call: "acadia.listQuizzes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-roles
          description: "List all job roles with training requirements and completion rates"
          hints:
            readOnly: true
            openWorld: false
          call: "acadia.listRoles"
          outputParameters:
            - type: object
              mapping: "$."
