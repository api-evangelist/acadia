description: >-
  Acadia is a Connected Worker Platform designed for employee productivity,
  acquired by Epicor. It delivers digital work instructions, knowledge
  management, skills matrices, quizzing, process evaluations, and team
  communications to frontline workers across manufacturing, transportation,
  healthcare, and retail banking. Acadia integrates with SSO, ERP, HRIS, LMS,
  IoT, and credentialing systems to enable enterprise-grade workforce
  development at scale.
